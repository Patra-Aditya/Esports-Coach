<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Obsidian Pulse | Esports AI Coach{% endblock %}</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Design System Tokens */
            --bg-base: #0B0B0E;
            --surface-card: rgba(22, 22, 29, 0.8);
            --primary-neon: #00D1FF;
            --secondary-neon: #BC00FF;
            --text-primary: #E5E1E6;
            --text-dim: #BBC9CF;
            --border-subtle: rgba(0, 209, 255, 0.15);
            --success-glow: #00FF94;
            --danger-glow: #FF005C;
            --blur-radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.01em;
        }

        nav {
            background-color: rgba(19, 19, 22, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1.25rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(0, 209, 255, 0.3));
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-neon);
            text-shadow: 0 0 8px rgba(0, 209, 255, 0.5);
        }

        .container {
            flex: 1;
            padding: 3rem;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--surface-card);
            backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(0, 209, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.15);
            transform: translateY(-4px);
        }

        .neon-btn {
            background: var(--primary-neon);
            color: #000;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 209, 255, 0.3);
        }

        .neon-btn:hover {
            background: #4cd6ff;
            box-shadow: 0 0 25px rgba(0, 209, 255, 0.6);
            transform: scale(1.02);
        }

        input[type="number"], input[type="text"], textarea {
            width: 100%;
            padding: 0.9rem;
            margin: 0.6rem 0 1.5rem;
            background-color: rgba(11, 11, 14, 0.8);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-neon);
            box-shadow: 0 0 0 1px var(--primary-neon);
        }

        label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-neon);
        }
    </style>
</head>
<body>
    <nav>
        <h1>Obsidian Pulse</h1>
        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Terminal</a>
            <a href="{% url 'ai_coach' %}">AI Intelligence</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
